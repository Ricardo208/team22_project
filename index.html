<!doctype html>
<html style="width:100%;height:100%;">
<head>
	<meta charset="utf-8">
	<meta name="description" content="The Cattle-Climate Feedback Loop - Team 22">
	<title>The Cattle-Climate Feedback Loop</title>
	<style>
		#tooltip {
			position: absolute;
			pointer-events: none;
			background: rgba(33, 33, 33, 0.92);
			color: #fff;
			font: 12px sans-serif;
			padding: 6px 8px;
			border-radius: 4px;
			opacity: 0;
			line-height: 1.35;
		}
		#controls {
			position: fixed;
			left: 0; right: 0; bottom: 0;
			height: 52px;
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 0 20px;
			box-sizing: border-box;
			background: #fafafa;
			border-top: 1px solid #e0e0e0;
			font: 13px sans-serif;
		}
		#play-btn {
			font: 13px sans-serif;
			padding: 5px 12px;
			border: 1px solid #bbb;
			border-radius: 4px;
			background: #fff;
			cursor: pointer;
			min-width: 84px;
		}
		#play-btn:hover { background: #f0f0f0; }
		#year-slider { flex: 1; cursor: pointer; }
		#year-label {
			font-weight: bold;
			min-width: 42px;
			text-align: right;
			font-variant-numeric: tabular-nums;
		}
		#replay-btn {
			font: 12px sans-serif;
			padding: 5px 10px;
			border: 1px solid #bbb;
			border-radius: 4px;
			background: #fff;
			cursor: pointer;
			white-space: nowrap;
		}
		#replay-btn:hover { background: #f0f0f0; }
		#tour {
			position: fixed;
			left: 18px;
			bottom: 64px;
			width: 340px;
			max-width: calc(100vw - 36px);
			background: rgba(255, 255, 255, 0.97);
			border: 1px solid #d8d8d8;
			border-left: 4px solid #2c7fb8;
			border-radius: 6px;
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
			padding: 12px 14px 12px;
			font: 13px sans-serif;
			z-index: 10;
		}
		#tour-step { font-size: 11px; color: #2c7fb8; font-weight: bold; letter-spacing: 0.04em; text-transform: uppercase; }
		#tour-title { font-size: 15px; font-weight: bold; color: #222; margin: 3px 0 6px; }
		#tour-body { font-size: 12.5px; color: #444; line-height: 1.45; }
		#tour-nav { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
		#tour-nav .spacer { flex: 1; }
		#tour-nav button {
			font: 12px sans-serif;
			padding: 5px 12px;
			border: 1px solid #bbb;
			border-radius: 4px;
			background: #fff;
			cursor: pointer;
		}
		#tour-nav button:hover:not(:disabled) { background: #f0f0f0; }
		#tour-nav button:disabled { opacity: 0.4; cursor: default; }
		#tour-next { background: #2c7fb8 !important; color: #fff; border-color: #2c7fb8 !important; }
		#tour-next:hover { background: #246a9c !important; }
		#tour-skip { font-size: 11px; color: #888; }
	</style>
</head>
<body style="width:100%;height:100%;margin:0;font-family:sans-serif;">
	<svg width="100%" height="100%"></svg>
	<div id="tooltip"></div>

	<div id="tour">
		<div id="tour-step">Act 1 / 5</div>
		<div id="tour-title">Title</div>
		<div id="tour-body">Body</div>
		<div id="tour-nav">
			<button id="tour-skip">Skip tour</button>
			<span class="spacer"></span>
			<button id="tour-prev">&#8592; Back</button>
			<button id="tour-next">Next &#8594;</button>
		</div>
	</div>

	<div id="controls">
		<button id="play-btn">&#9654; Play</button>
		<input id="year-slider" type="range" min="1990" max="2021" value="2021" step="1">
		<span id="year-label">2021</span>
		<button id="replay-btn">&#8635; Replay tour</button>
	</div>

	<script src="https://d3js.org/d3.v5.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
	<script src="main.js"></script>
</body>
</html>
